<!-- interactive-ui.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Exam Whisperer - Interactive 3D</title>
    <style>
        body { margin: 0; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050510; color: white; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        /* UI Overlay - stays on top of canvas */
        .content {
            position: relative;
            z-index: 10;
            min-height: 200vh; /* Allows scrolling to drive animation */
            pointer-events: none; /* Allows clicking through to canvas if needed */
        }
        .section {
            pointer-events: auto;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            margin: 100vh 5% 50vh;
            padding: 2rem;
            border-radius: 24px;
            border-left: 4px solid #4299e1;
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(135deg, #fff, #4299e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @media (max-width: 768px) { .section { margin: 80vh 5% 40vh; padding: 1.5rem; } h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="content">
        <div class="section" style="margin-top: 20vh;">
            <h1>Exam Whisperer</h1>
            <p>Scroll to explore predictions<br>Powered by AI</p>
        </div>
        <div class="section">
            <h2>📚 AP History</h2>
            <p>Analyzing causes of the American Revolution...</p>
        </div>
        <div class="section">
            <h2>🧪 AP Biology</h2>
            <p>Predicting questions on signal transduction...</p>
        </div>
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup Scene, Camera, Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008); // Subtle fog for depth

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing (Bloom/Glow) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controls for interactivity (optional, allows user to orbit) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);

        // --- Central Object: A glowing, rotating "Brain" Torus Knot ---
        const geometry = new THREE.TorusKnotGeometry(1.2, 0.3, 200, 32, 3, 4);
        const material = new THREE.MeshStandardMaterial({
            color: 0x4299e1,
            emissive: 0x1a4c7a,
            emissiveIntensity: 0.6,
            metalness: 0.7,
            roughness: 0.3,
            transparent: true,
            opacity: 0.9
        });
        const knot = new THREE.Mesh(geometry, material);
        scene.add(knot);

        // Add an inner glowing sphere
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x7c6af7, emissive: 0x3b2ad0, emissiveIntensity: 0.8, transparent: true });
        const core = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), coreMat);
        scene.add(core);

        // --- Floating Particles (Stars / Words could be added similarly) ---
        const particleCount = 1500;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            // Distribute particles in a sphere radius 5
            const radius = 3 + Math.random() * 3;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particlesGeometry, particleMat);
        scene.add(particles);

        // --- Lights for dynamic shadows and highlights ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 4);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // Simple star field background (distant particles)
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 2000; i++) {
            starPos.push((Math.random() - 0.5) * 200);
            starPos.push((Math.random() - 0.5) * 100);
            starPos.push((Math.random() - 0.5) * 50 - 30);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);

        // --- Scroll Animation: Camera moves up/down and knot rotates faster ---
        let scrollPercent = 0;
        window.addEventListener('scroll', () => {
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            scrollPercent = maxScroll > 0 ? window.scrollY / maxScroll : 0;
            
            // Camera movement: rotate around Y and slightly elevate
            const angle = scrollPercent * Math.PI * 2;
            const radius = 10;
            const camX = Math.sin(angle) * radius * 0.5;
            const camZ = Math.cos(angle) * radius;
            camera.position.x = camX;
            camera.position.z = camZ;
            camera.position.y = 2 + scrollPercent * 3;
            controls.target.set(0, scrollPercent * 1.5, 0);
            controls.update();
            
            // Rotate core and knot based on scroll
            knot.rotation.x = scrollPercent * Math.PI * 2;
            knot.rotation.y = scrollPercent * Math.PI * 1.5;
            core.rotation.z = scrollPercent * Math.PI;
            
            // Particle field rotation
            particles.rotation.y = scrollPercent * 2;
            stars.rotation.x = scrollPercent * 0.5;
        });

        // --- Animation Loop ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Continuous gentle rotation even when not scrolling
            if (scrollPercent === 0) {
                knot.rotation.y += 0.005;
                knot.rotation.x += 0.003;
                core.rotation.z += 0.01;
            }
            
            // Pulsing effect for the core
            const scale = 1 + Math.sin(time * 3) * 0.05;
            core.scale.set(scale, scale, scale);
            
            // Animate particles
            particles.rotation.y += 0.002;
            stars.rotation.x += 0.0005;
            
            effectComposer.render();
        }
        
        animate();

        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Simple instructions for console
        console.log('Interactive 3D Scene Ready! Scroll to explore.');
    </script>
</body>
</html>
